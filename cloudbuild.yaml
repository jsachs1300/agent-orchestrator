steps:
  - name: gcr.io/cloud-builders/npm
    id: install-dependencies
    args: ["install"]

  - name: gcr.io/cloud-builders/npm
    id: run-tests
    args: ["test"]

  - name: gcr.io/cloud-builders/docker
    args: ["build", "-t", "gcr.io/$PROJECT_ID/agent-orchestrator", "."]

  - name: gcr.io/cloud-builders/docker
    args: ["push", "gcr.io/$PROJECT_ID/agent-orchestrator"]

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      [
        "run",
        "deploy",
        "$_SERVICE_NAME",
        "--image",
        "gcr.io/$PROJECT_ID/agent-orchestrator",
        "--region",
        "$_REGION",
        "--platform",
        "managed",
        "--allow-unauthenticated",
        "--set-env-vars",
        "PORT=8080"
      ]

images:
  - gcr.io/$PROJECT_ID/agent-orchestrator

timeout: 1200s
substitutions:
  _SERVICE_NAME: agent-orchestrator
  _REGION: us-central1
